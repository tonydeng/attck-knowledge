[book]
title = "ATT&CK 知识库"
authors = ["Tony Deng"]
description = "基于 MITRE ATT&CK® v19 Enterprise 矩阵的中文知识库，覆盖全部 15 个战术和 254+ 个技术"
language = "zh-CN"
src = "src"

[build]
build-dir = "_book"
create-missing = false

# [preprocessor.attck-preprocess]
# command = "python scripts/mdbook-preprocessor.py"

[preprocessor.mermaid]
command = "mdbook-mermaid"

[output.html]
no-section-label = true
default-theme = "catppuccin"
preferred-dark-theme = "catppuccin-mocha"
additional-css = ["theme/catppuccin.css"]
additional-js = ["theme/mermaid.min.js", "theme/mermaid-init.js"]
git-repository-url = "https://github.com/tonydeng/attck-knowledge"
edit-url-template = "https://github.com/tonydeng/attck-knowledge/edit/main/src/{path}"

[output.html.search]
enable = true
limit-results = 30
teaser-word-count = 15
use-boolean-and = true
boost-title = 5
boost-hierarchy = 3
boost-paragraph = 1
expand = true
heading-split-level = 2

[output.html.fold]
enable = true
level = 0

[output.html.playground]
copyable = true

[output.html.code]
hidelines = {}
